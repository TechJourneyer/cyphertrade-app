# Cyphertrade App - Docker Compose Development Override
# Use: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

version: '3.8'

services:
  # ===========================================
  # React Application - Development Mode
  # ===========================================
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: cyphertrade-web-dev
    # Volumes disabled until React app is scaffolded
    # volumes:
    #   # Mount source code for hot reload
    #   - .:/app
    #   # Preserve node_modules inside container
    #   - /app/node_modules
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      - NEXT_TELEMETRY_DISABLED=1
    stdin_open: true
    tty: true
